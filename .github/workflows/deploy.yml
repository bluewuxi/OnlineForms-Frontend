name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      FRONTEND_INFRA_STACK_NAME: ${{ vars.FRONTEND_INFRA_STACK_NAME }}
      FRONTEND_CUSTOM_DOMAIN_NAME: ${{ vars.FRONTEND_CUSTOM_DOMAIN_NAME }}
      FRONTEND_HOSTED_ZONE_ID: ${{ vars.FRONTEND_HOSTED_ZONE_ID }}
      FRONTEND_CUSTOM_DOMAIN_CERT_ARN: ${{ vars.FRONTEND_CUSTOM_DOMAIN_CERT_ARN }}
      API_STACK_NAME: ${{ vars.STACK_NAME }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE }}
      VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
      VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
      VITE_COGNITO_REDIRECT_URI: ${{ vars.VITE_COGNITO_REDIRECT_URI }}
      VITE_COGNITO_SCOPE: ${{ vars.VITE_COGNITO_SCOPE }}
      VITE_COGNITO_TOKEN_USE: ${{ vars.VITE_COGNITO_TOKEN_USE }}
      COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN }}
      COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
      COGNITO_TOKEN_USE: ${{ vars.COGNITO_TOKEN_USE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-onlineforms-frontend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Normalize frontend auth environment
        run: |
          if [ -z "$VITE_AUTH_MODE" ]; then
            echo "VITE_AUTH_MODE=cognito" >> "$GITHUB_ENV"
            echo "Normalized VITE_AUTH_MODE to cognito."
          fi
          if [ -z "$VITE_COGNITO_DOMAIN" ] && [ -n "$COGNITO_DOMAIN" ]; then
            echo "VITE_COGNITO_DOMAIN=$COGNITO_DOMAIN" >> "$GITHUB_ENV"
            echo "Hydrated VITE_COGNITO_DOMAIN from COGNITO_DOMAIN."
          fi
          if [ -z "$VITE_COGNITO_CLIENT_ID" ] && [ -n "$COGNITO_CLIENT_ID" ]; then
            echo "VITE_COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> "$GITHUB_ENV"
            echo "Hydrated VITE_COGNITO_CLIENT_ID from COGNITO_CLIENT_ID."
          fi
          if [ -z "$VITE_COGNITO_TOKEN_USE" ] && [ -n "$COGNITO_TOKEN_USE" ]; then
            echo "VITE_COGNITO_TOKEN_USE=$COGNITO_TOKEN_USE" >> "$GITHUB_ENV"
            echo "Hydrated VITE_COGNITO_TOKEN_USE from COGNITO_TOKEN_USE."
          fi
          if [ -z "$VITE_COGNITO_REDIRECT_URI" ] && [ -n "$FRONTEND_CUSTOM_DOMAIN_NAME" ]; then
            echo "VITE_COGNITO_REDIRECT_URI=https://$FRONTEND_CUSTOM_DOMAIN_NAME/org/login" >> "$GITHUB_ENV"
            echo "Hydrated VITE_COGNITO_REDIRECT_URI from FRONTEND_CUSTOM_DOMAIN_NAME."
          fi
          if [ -z "$VITE_COGNITO_SCOPE" ]; then
            echo "VITE_COGNITO_SCOPE=openid profile email" >> "$GITHUB_ENV"
            echo "Normalized VITE_COGNITO_SCOPE to default scopes."
          fi
          if [ -z "$VITE_COGNITO_TOKEN_USE" ]; then
            echo "VITE_COGNITO_TOKEN_USE=access" >> "$GITHUB_ENV"
            echo "Normalized VITE_COGNITO_TOKEN_USE to access."
          fi

      - name: Resolve backend API stack name
        run: |
          if [ -n "$API_STACK_NAME" ]; then
            echo "Using configured API_STACK_NAME=$API_STACK_NAME."
            exit 0
          fi
          if [ -n "$FRONTEND_INFRA_STACK_NAME" ]; then
            INFERRED_STACK=${FRONTEND_INFRA_STACK_NAME%FrontendInfra}
            if [ -n "$INFERRED_STACK" ] && [ "$INFERRED_STACK" != "$FRONTEND_INFRA_STACK_NAME" ]; then
              echo "API_STACK_NAME=$INFERRED_STACK" >> "$GITHUB_ENV"
              echo "Inferred API_STACK_NAME=$INFERRED_STACK from FRONTEND_INFRA_STACK_NAME=$FRONTEND_INFRA_STACK_NAME."
              exit 0
            fi
          fi
          echo "API_STACK_NAME is not set."
          echo "Set STACK_NAME (backend stack) in frontend repo variables, or set VITE_COGNITO_DOMAIN and VITE_COGNITO_CLIENT_ID explicitly."

      - name: Hydrate Cognito client id from backend stack output
        run: |
          if [ "$VITE_AUTH_MODE" = "cognito" ] && [ -z "$VITE_COGNITO_CLIENT_ID" ] && [ -n "$API_STACK_NAME" ]; then
            CLIENT_ID=$(aws cloudformation describe-stacks \
              --stack-name "$API_STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" \
              --output text)
            if [ -n "$CLIENT_ID" ] && [ "$CLIENT_ID" != "None" ]; then
              echo "VITE_COGNITO_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
              echo "Hydrated VITE_COGNITO_CLIENT_ID from backend stack output."
            else
              echo "Unable to resolve CognitoUserPoolClientId from stack '$API_STACK_NAME'."
            fi
          else
            echo "Skipped backend stack client-id hydration."
          fi

      - name: Hydrate Cognito domain from backend stack output
        run: |
          if [ "$VITE_AUTH_MODE" != "cognito" ] || [ -n "$VITE_COGNITO_DOMAIN" ] || [ -z "$API_STACK_NAME" ]; then
            echo "Skipped backend stack domain hydration."
            exit 0
          fi

          DOMAIN_URL=$(aws cloudformation describe-stacks \
            --stack-name "$API_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoHostedUiDomainUrl'].OutputValue" \
            --output text 2>/dev/null || true)

          if [ -n "$DOMAIN_URL" ] && [ "$DOMAIN_URL" != "None" ]; then
            echo "VITE_COGNITO_DOMAIN=$DOMAIN_URL" >> "$GITHUB_ENV"
            echo "Hydrated VITE_COGNITO_DOMAIN from backend stack output CognitoHostedUiDomainUrl."
            exit 0
          fi

          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name "$API_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" \
            --output text)
          if [ -z "$USER_POOL_ID" ] || [ "$USER_POOL_ID" = "None" ]; then
            echo "Unable to resolve CognitoUserPoolId from stack '$API_STACK_NAME'."
            exit 0
          fi

          DOMAIN_VALUE=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$USER_POOL_ID" \
            --query "UserPool.Domain" \
            --output text)

          if [ -z "$DOMAIN_VALUE" ] || [ "$DOMAIN_VALUE" = "None" ]; then
            echo "User pool '$USER_POOL_ID' has no hosted UI domain configured."
            exit 0
          fi

          if [[ "$DOMAIN_VALUE" == *"."* ]]; then
            FULL_DOMAIN="https://$DOMAIN_VALUE"
          else
            FULL_DOMAIN="https://$DOMAIN_VALUE.auth.$AWS_REGION.amazoncognito.com"
          fi

          echo "VITE_COGNITO_DOMAIN=$FULL_DOMAIN" >> "$GITHUB_ENV"
          echo "Hydrated VITE_COGNITO_DOMAIN from user pool '$USER_POOL_ID'."

      - name: Validate frontend auth environment
        run: |
          case "$VITE_AUTH_MODE" in
            mock|cognito) ;;
            *)
              echo "Invalid VITE_AUTH_MODE: '$VITE_AUTH_MODE'. Expected mock or cognito."
              exit 1
              ;;
          esac
          if [ "$VITE_AUTH_MODE" = "cognito" ]; then
            if [ -z "$VITE_COGNITO_DOMAIN" ] || [ -z "$VITE_COGNITO_CLIENT_ID" ] || [ -z "$VITE_COGNITO_REDIRECT_URI" ]; then
              echo "Cognito mode requires VITE_COGNITO_DOMAIN, VITE_COGNITO_CLIENT_ID, and VITE_COGNITO_REDIRECT_URI."
              exit 1
            fi
          fi
          case "$VITE_COGNITO_TOKEN_USE" in
            access|id) ;;
            *)
              echo "Invalid VITE_COGNITO_TOKEN_USE: '$VITE_COGNITO_TOKEN_USE'. Expected access or id."
              exit 1
              ;;
          esac

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy frontend hosting stack (CloudFormation)
        run: |
          aws cloudformation deploy \
            --stack-name "$FRONTEND_INFRA_STACK_NAME" \
            --template-file infra/frontend-hosting.yaml \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              FrontendBucketName=$S3_BUCKET \
              CustomDomainName=$FRONTEND_CUSTOM_DOMAIN_NAME \
              HostedZoneId=$FRONTEND_HOSTED_ZONE_ID \
              AcmCertificateArnUsEast1=$FRONTEND_CUSTOM_DOMAIN_CERT_ARN

      - name: Resolve CloudFront distribution id from stack output
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_INFRA_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)
          echo "CLOUDFRONT_DISTRIBUTION_ID=$DIST_ID" >> "$GITHUB_ENV"

      - name: Upload static assets (long cache)
        run: |
          aws s3 sync dist s3://$S3_BUCKET \
            --delete \
            --exclude "index.html" \
            --exclude "404.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload HTML entrypoints (short cache)
        run: |
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "public,max-age=300,must-revalidate" \
            --content-type "text/html; charset=utf-8"
          aws s3 cp dist/404.html s3://$S3_BUCKET/404.html \
            --cache-control "public,max-age=300,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html" "/404.html" "/*"
