name: Bug report
description: Report a defect with reproduction and evidence.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - local
        - stage
        - prod
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps and payloads.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include request ID, correlation ID, logs, screenshots, and links.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suspected scope
      description: frontend/backend/infra/data
    validations:
      required: false
